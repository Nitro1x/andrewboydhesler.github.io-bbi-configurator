<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBI Project Configurator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body class="bg-slate-50 p-4 md:p-8">
    <div id="quote-container" class="max-w-4xl mx-auto bg-white shadow-xl rounded-xl p-6 border border-slate-200">
        <div class="flex justify-between items-center border-b pb-6 mb-6">
            <div>
                <h1 class="text-3xl font-bold text-slate-900">BattleBorn Infrastructures</h1>
                <p class="text-slate-500 italic text-sm">Precision Network Engineering & Infrastructure</p>
            </div>
            <div class="text-right">
                <p class="font-bold text-blue-700">PROJECT QUOTE</p>
                <p id="quote-date" class="text-xs text-slate-500"></p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div>
                <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Customer Name</label>
                <input type="text" id="cust-name" class="w-full border p-2 rounded bg-slate-50 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Enter Name">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Deployment Urgency</label>
                <select id="urgency" class="w-full border p-2 rounded bg-slate-50" onchange="calculateTotal()">
                    <option value="standard">Standard (7-10 Days)</option>
                    <option value="expedited">Expedited (+20% Labor Cost)</option>
                </select>
            </div>
        </div>

        <div class="mb-8">
            <h3 class="font-bold text-lg mb-4 text-slate-800 border-b pb-2">Hardware Selection</h3>
            <div class="grid grid-cols-1 gap-3">
                <div class="flex justify-between items-center p-3 bg-slate-50 rounded border hover:border-blue-300 transition">
                    <label class="flex items-center gap-3 cursor-pointer">
                        <input type="checkbox" class="hw-item w-4 h-4" data-price="499" onchange="calculateTotal()"> 
                        <span>Ubiquiti Dream Machine Special Edition</span>
                    </label>
                    <span class="font-mono text-slate-600">$499.00</span>
                </div>
                <div class="flex justify-between items-center p-3 bg-slate-50 rounded border hover:border-blue-300 transition">
                    <label class="flex items-center gap-3 cursor-pointer">
                        <input type="checkbox" class="hw-item w-4 h-4" data-price="189" onchange="calculateTotal()"> 
                        <span>WiFi 6 Professional Access Point</span>
                    </label>
                    <span class="font-mono text-slate-600">$189.00</span>
                </div>
                <div class="flex justify-between items-center p-3 bg-slate-50 rounded border hover:border-blue-300 transition">
                    <label class="flex items-center gap-3 cursor-pointer">
                        <input type="checkbox" class="hw-item w-4 h-4" data-price="799" onchange="calculateTotal()"> 
                        <span>48-Port PoE++ Managed Switch</span>
                    </label>
                    <span class="font-mono text-slate-600">$799.00</span>
                </div>
            </div>
            <div class="mt-4 flex items-center justify-between p-3 bg-blue-50 rounded-lg border border-blue-100">
                <span class="font-semibold text-blue-900">Estimated Engineering Hours:</span>
                <input type="number" id="labor-hours" value="1" min="1" class="border w-20 p-2 text-center rounded font-bold" onchange="calculateTotal()">
            </div>
        </div>

        <div class="mb-8">
            <h3 class="font-bold text-lg mb-4 text-slate-800 border-b pb-2">Monthly Managed Services (SLA)</h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="p-3 border rounded-lg bg-slate-50">
                    <label class="flex flex-col cursor-pointer">
                        <input type="radio" name="sla-tier" value="0" checked onchange="calculateTotal()" class="mb-2">
                        <span class="font-bold">No SLA</span>
                        <span class="text-xs text-slate-500 italic">On-call/Hourly Only</span>
                    </label>
                </div>
                <div class="p-3 border rounded-lg bg-slate-50">
                    <label class="flex flex-col cursor-pointer">
                        <input type="radio" name="sla-tier" value="149" onchange="calculateTotal()" class="mb-2">
                        <span class="font-bold text-blue-800">Standard</span>
                        <span class="text-sm font-bold">$149/mo</span>
                        <span class="text-[10px] text-slate-500">Remote Updates & Monitoring</span>
                    </label>
                </div>
                <div class="p-3 border rounded-lg bg-slate-50">
                    <label class="flex flex-col cursor-pointer">
                        <input type="radio" name="sla-tier" value="299" onchange="calculateTotal()" class="mb-2">
                        <span class="font-bold text-blue-800">Premium</span>
                        <span class="text-sm font-bold">$299/mo</span>
                        <span class="text-[10px] text-slate-500">24/7 Priority + On-site Backup</span>
                    </label>
                </div>
            </div>
        </div>

        <div class="bg-slate-900 text-white p-6 rounded-xl mb-8 border-t-4 border-blue-600">
            <div class="flex justify-between mb-2 text-slate-400 text-sm"><span>Hardware & Install Subtotal:</span> <span id="one-time-total">$0.00</span></div>
            <div class="flex justify-between mb-4 text-blue-400 text-sm font-bold"><span>Recurring Monthly Service:</span> <span id="sla-total">$0.00</span></div>
            <div class="flex justify-between text-2xl font-bold border-t border-slate-700 pt-4">
                <span>ESTIMATED TOTAL:</span> <span id="grand-total">$0.00</span>
            </div>
        </div>

        <div class="flex flex-col md:flex-row gap-4 no-print">
            <button onclick="sendEmail()" class="flex-1 bg-blue-700 text-white py-4 rounded-lg font-bold hover:bg-blue-800 transition shadow-lg">Submit to BBI Engineering</button>
            <button onclick="downloadPDF()" class="flex-1 bg-slate-800 text-white py-4 rounded-lg font-bold hover:bg-

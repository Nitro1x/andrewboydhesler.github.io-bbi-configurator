<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBI Configurator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body class="bg-gray-100 p-4">
    <div id="quote-container" class="max-w-2xl mx-auto bg-white p-6 shadow-lg rounded-lg border">
        <h1 class="text-2xl font-bold border-b pb-2 mb-4">BattleBorn Quote Tool</h1>
        
        <div class="space-y-4 mb-6">
            <input type="text" id="cust-name" placeholder="Customer Name" class="w-full border p-2 rounded">
            
            <div class="flex items-center justify-between p-2 bg-gray-50 rounded">
                <label><input type="checkbox" id="check-udm" onchange="runCalc()"> Dream Machine ($499)</label>
                <input type="number" id="qty-udm" value="1" min="1" class="w-16 border text-center" onchange="runCalc()">
            </div>

            <div class="flex items-center justify-between p-2 bg-gray-50 rounded">
                <label><input type="checkbox" id="check-ap" onchange="runCalc()"> WiFi 6 AP ($189)</label>
                <input type="number" id="qty-ap" value="1" min="1" class="w-16 border text-center" onchange="runCalc()">
            </div>

            <div class="p-2 bg-blue-50 rounded">
                <label class="block text-sm font-bold">Labor Hours ($150/hr)</label>
                <input type="number" id="labor-hours" value="1" min="0" class="w-full border p-2" onchange="runCalc()">
            </div>
        </div>

        <div class="bg-black text-white p-4 rounded mb-6">
            <div class="flex justify-between"><span>Total:</span> <span id="grand-total" class="text-xl font-bold">$0.00</span></div>
        </div>

        <div class="grid grid-cols-2 gap-2" id="btn-row">
            <button onclick="sendBBI()" class="bg-blue-600 text-white p-3 rounded font-bold">Send Email</button>
            <button onclick="saveBBI()" class="bg-gray-800 text-white p-3 rounded font-bold">Get PDF</button>
        </div>
    </div>

    <div id="debug-log" class="max-w-2xl mx-auto mt-4 text-xs text-red-500 font-mono"></div>

    <script>
        function log(msg) { document.getElementById('debug-log').innerText += "> " + msg + "\n"; }

        try {
            emailjs.init("RFH52WT8kwrRyAhT6");
            log("EmailJS Ready");
        } catch(e) { log("Init Error: " + e); }

        function runCalc() {
            try {
                let total = 0;
                
                if(document.getElementById('check-udm').checked) {
                    total += 499 * parseInt(document.getElementById('qty-udm').value);
                }
                
                if(document.getElementById('check-ap').checked) {
                    total += 189 * parseInt(document.getElementById('qty-ap').value);
                }
                
                let hours = parseFloat(document.getElementById('labor-hours').value) || 0;
                total += (hours * 150);

                document.getElementById('grand-total').innerText = "$" + total.toFixed(2);
                log("Calc Success: $" + total);
            } catch(e) { log("Calc Error: " + e); }
        }

        function saveBBI() {
            log("Starting PDF...");
            const el = document.getElementById('quote-container');
            const btns = document.getElementById('btn-row');
            btns.style.display = 'none';
            
            html2pdf().from(el).save().then(() => {
                btns.style.display = 'grid';
                log("PDF Done");
            }).catch(e => log("PDF Error: " + e));
        }

        function sendBBI() {
            const name = document.getElementById('cust-name').value;
            if(!name) { alert("Enter Name"); return; }
            
            const p = {
                customer_name: name,
                total_amount: document.getElementById('grand-total').innerText,
                project_details: "BBI Configurator Quote"
            };

            emailjs.send("service_ij65q1c", "template_yna3pxb", p)
                .then(() => alert("Sent!"))
                .catch(e => log("Email Error: " + JSON.stringify(e)));
        }

        runCalc();
    </script>
</body>
</html>

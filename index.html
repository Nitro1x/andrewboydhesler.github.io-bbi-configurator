<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBI Project Configurator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body class="bg-slate-100 p-4 md:p-8">
    <div id="quote-container" class="max-w-2xl mx-auto bg-white shadow-2xl rounded-xl p-8 border border-slate-200">
        
        <div class="flex justify-between items-center border-b-2 border-slate-900 pb-6 mb-8">
            <div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tighter uppercase">BattleBorn</h1>
                <p class="text-blue-600 font-bold text-xs uppercase tracking-widest">Infrastructures</p>
            </div>
            <div class="text-right">
                <p class="text-xs text-slate-400 font-mono" id="quote-date"></p>
            </div>
        </div>

        <div class="space-y-4 mb-8">
            <h3 class="text-sm font-black text-slate-900 border-b pb-2 uppercase italic">Project Configuration</h3>
            
            <div class="flex items-center justify-between p-4 bg-slate-50 rounded-lg border border-slate-200">
                <div class="flex items-center gap-4">
                    <input type="checkbox" id="check-udm" class="w-5 h-5 accent-blue-600" onchange="runBBI()">
                    <span class="font-bold text-slate-700">Dream Machine SE</span>
                </div>
                <div class="flex items-center gap-4">
                    <input type="number" id="qty-udm" value="1" min="1" class="w-12 text-center border rounded font-bold" onchange="runBBI()">
                    <span class="font-mono text-slate-500">$499</span>
                </div>
            </div>

            <div class="flex items-center justify-between p-4 bg-slate-50 rounded-lg border border-slate-200">
                <div class="flex items-center gap-4">
                    <input type="checkbox" id="check-ap" class="w-5 h-5 accent-blue-600" onchange="runBBI()">
                    <span class="font-bold text-slate-700">WiFi 6 Pro AP</span>
                </div>
                <div class="flex items-center gap-4">
                    <input type="number" id="qty-ap" value="1" min="1" class="w-12 text-center border rounded font-bold" onchange="runBBI()">
                    <span class="font-mono text-slate-500">$189</span>
                </div>
            </div>

            <div class="p-4 bg-blue-50 rounded-lg border border-blue-200">
                <div class="flex justify-between items-center">
                    <span class="font-black text-blue-900 uppercase text-xs">Engineering Labor ($150/hr)</span>
                    <input type="number" id="labor-hours" value="1" min="1" class="w-16 text-center border-2 border-blue-300 rounded font-black text-blue-900" onchange="runBBI()">
                </div>
            </div>
        </div>

        <div class="bg-slate-900 text-white p-6 rounded-xl shadow-xl">
            <div class="flex justify-between text-sm text-slate-400 mb-2">
                <span>Hardware Subtotal:</span>
                <span id="hw-total">$0.00</span>
            </div>
            <div class="flex justify-between text-sm text-slate-400 mb-4 pb-4 border-b border-slate-700">
                <span>Professional Install:</span>
                <span id="install-cost">$150.00</span>
            </div>
            <div class="flex justify-between items-center">
                <span class="text-xl font-black tracking-tighter uppercase">Total Estimate</span>
                <span id="grand-total" class="text-3xl font-black text-blue-400">$150.00</span>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mt-8 no-print" id="action-row">
            <button onclick="sendBBI()" class="bg-blue-600 text-white font-black py-4 rounded-lg uppercase tracking-widest shadow-lg">Submit</button>
            <button onclick="pdfBBI()" class="bg-slate-800 text-white font-black py-4 rounded-lg uppercase tracking-widest shadow-lg">PDF Quote</button>
        </div>
    </div>

    <script>
        (function() { emailjs.init("kQB8iU16sN2nEoBsI"); })();
        document.getElementById('quote-date').innerText = new Date().toLocaleDateString();

        function runBBI() {
            let hw = 0;
            if(document.getElementById('check-udm').checked) {
                hw += 499 * (parseInt(document.getElementById('qty-udm').value) || 0);
            }
            if(document.getElementById('check-ap').checked) {
                hw += 189 * (parseInt(document.getElementById('qty-ap').value) || 0);
            }

            const hrs = parseFloat(document.getElementById('labor-hours').value) || 0;
            const labor = hrs * 150;
            const total = hw + labor;

            document.getElementById('hw-total').innerText = "$" + hw.toFixed(2);
            document.getElementById('install-cost').innerText = "$" + labor.toFixed(2);
            document.getElementById('grand-total').innerText = "$" + total.toFixed(2);
        }

        async function pdfBBI() {
            const el = document.getElementById('quote-container');
            const btns = document.getElementById('action-row');
            btns.style.display = 'none';
            await html2pdf().from(el).save();
            btns.style.display = 'grid';
        }

        function sendBBI() {
    const name = document.getElementById('cust-name').value;
    if(!name) { 
        alert("Mission Aborted: Please enter a Client Name so I know who this is for."); 
        return; 
    }
    
    // These keys MUST match the {{variable_names}} in your EmailJS Template
    const params = {
        customer_name: name,
        total_amount: document.getElementById('grand-total').innerText,
        hw_total: document.getElementById('hw-total').innerText,
        labor_total: document.getElementById('install-cost').innerText,
        reply_to: "office@battleborninfrastructures.com"
    };

    console.log("Attempting to transmit to BBI HQ...", params);

    emailjs.send("service_i3y37up", "template_szzyg8f", params)
        .then((res) => {
            console.log("SUCCESS!", res.status, res.text);
            alert("Mission Transmitted! BBI Engineering has received your request.");
        })
        .catch((err) => {
            console.error("TRANSMISSION FAILURE:", err);
            alert("Error: Check your EmailJS Dashboard. Is the Service ID 'service_i3y37up' correct?");
        });
}

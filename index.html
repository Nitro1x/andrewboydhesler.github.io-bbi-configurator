<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBI Project Configurator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script>
        (function() {
            emailjs.init("RFH52WT8kwrRyAhT6"); // Your Public Key
        })();
    </script>
</head>
<body class="bg-slate-50 p-4 md:p-8">
    <div id="quote-container" class="max-w-4xl mx-auto bg-white shadow-xl rounded-xl p-6 border border-slate-200">
        <div class="flex justify-between items-center border-b pb-6 mb-6">
            <div>
                <h1 class="text-3xl font-bold text-slate-900">BattleBorn Infrastructures</h1>
                <p class="text-slate-500 italic">Precision Network Engineering & Infrastructure</p>
            </div>
            <div class="text-right">
                <p class="font-bold text-blue-700">PROJECT QUOTE</p>
                <p id="quote-date" class="text-sm text-slate-500"></p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div>
                <label class="block text-sm font-semibold mb-2">Customer Name</label>
                <input type="text" id="cust-name" class="w-full border p-2 rounded" placeholder="John Doe">
            </div>
            <div>
                <label class="block text-sm font-semibold mb-2">Project Urgency</label>
                <select id="urgency" class="w-full border p-2 rounded" onchange="calculateTotal()">
                    <option value="standard">Standard (7-10 Days)</option>
                    <option value="expedited">Expedited (+20% Labor Cost)</option>
                </select>
            </div>
        </div>

        <div class="mb-8">
            <h3 class="font-bold text-lg mb-4 text-slate-800 border-b">Infrastructure Selection</h3>
            <div class="space-y-3">
                <div class="flex justify-between items-center p-3 bg-slate-50 rounded">
                    <label><input type="checkbox" class="hw-item" data-price="499" onchange="calculateTotal()"> Ubiquiti Dream Machine SE</label>
                    <span class="font-mono">$499.00</span>
                </div>
                <div class="flex justify-between items-center p-3 bg-slate-50 rounded">
                    <label><input type="checkbox" class="hw-item" data-price="189" onchange="calculateTotal()"> WiFi 6 Professional Access Point</label>
                    <span class="font-mono">$189.00</span>
                </div>
                <div class="flex justify-between items-center p-3 bg-slate-50 rounded">
                    <label><input type="checkbox" class="hw-item" data-price="799" onchange="calculateTotal()"> 48-Port PoE++ Managed Switch</label>
                    <span class="font-mono">$799.00</span>
                </div>
                <div class="flex justify-between items-center p-4">
                    <label class="font-semibold">Estimated Labor Hours:</label>
                    <input type="number" id="labor-hours" value="1" min="1" class="border w-20 p-1 text-center" onchange="calculateTotal()">
                </div>
            </div>
        </div>

        <div class="bg-slate-900 text-white p-6 rounded-lg mb-8">
            <div class="flex justify-between mb-2"><span>Hardware Subtotal:</span> <span id="hw-total">$0.00</span></div>
            <div class="flex justify-between mb-2"><span>Engineering Labor ($150/hr):</span> <span id="labor-total">$0.00</span></div>
            <div class="flex justify-between text-2xl font-bold border-t pt-4 mt-4 text-blue-400">
                <span>ESTIMATED TOTAL:</span> <span id="grand-total">$0.00</span>
            </div>
        </div>

        <div class="flex flex-col md:flex-row gap-4 no-print">
            <button onclick="sendEmail()" class="flex-1 bg-blue-700 text-white py-3 rounded-lg font-bold hover:bg-blue-800 transition">Submit to BBI Engineering</button>
            <button onclick="downloadPDF()" class="flex-1 bg-slate-800 text-white py-3 rounded-lg font-bold hover:bg-slate-900 transition">Download PDF Quote</button>
        </div>
    </div>

    <script>
        document.getElementById('quote-date').innerText = new Date().toLocaleDateString();

        function calculateTotal() {
            let hwSub = 0;
            document.querySelectorAll('.hw-item:checked').forEach(item => {
                hwSub += parseFloat(item.getAttribute('data-price'));
            });

            const hours = parseFloat(document.getElementById('labor-hours').value) || 0;
            let laborCost = hours * 150;
            
            if (document.getElementById('urgency').value === 'expedited') {
                laborCost *= 1.20;
            }

            const total = hwSub + laborCost;

            document.getElementById('hw-total').innerText = `$${hwSub.toFixed(2)}`;
            document.getElementById('labor-total').innerText = `$${laborCost.toFixed(2)}`;
            document.getElementById('grand-total').innerText = `$${total.toFixed(2)}`;
        }

        function downloadPDF() {
            const element = document.getElementById('quote-container');
            const opt = {
                margin: 0.5,
                filename: `BBI_Quote_${document.getElementById('cust-name').value || 'New_Project'}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }

        function sendEmail() {
            const name = document.getElementById('cust-name').value;
            if(!name) { alert("Please enter a customer name."); return; }

            const params = {
                customer_name: name,
                total_amount: document.getElementById('grand-total').innerText,
                project_details: `Hardware: ${document.getElementById('hw-total').innerText} | Labor: ${document.getElementById('labor-total').innerText}`,
                reply_to: "office@battleborninfrastructures.com"
            };

            emailjs.send("service_ij65q1c", "template_yna3pxb", params)
                .then(() => alert("Mission Transmitted! BBI will review your quote."))
                .catch((err) => alert("Transmission Error: " + JSON.stringify(err)));
        }
    </script>
</body>
</html>
